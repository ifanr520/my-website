<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" role="img" aria-label="国外银行 · 开过的那些卡">
  <defs>
    <radialGradient id="paper" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="60%" stop-color="#fdf3e3"/>
      <stop offset="100%" stop-color="#f5e6cf"/>
    </radialGradient>
    <filter id="grain" x="0" y="0">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" result="n"/>
      <feColorMatrix in="n" values="0 0 0 0 0.92  0 0 0 0 0.85  0 0 0 0 0.74  0 0 0 0.18 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#paper)"/>
  <rect width="800" height="500" filter="url(#grain)" opacity="0.6"/>
  <!-- soft blob -->
  <circle cx="640" cy="120" r="120" fill="#f4c98a" opacity="0.55"/>
  <circle cx="120" cy="380" r="90" fill="#e9b88c" opacity="0.45"/>
  <!-- passport -->
  <g transform="translate(220 130) rotate(-6)">
    <rect x="0" y="0" width="200" height="270" rx="16" fill="#7c2d12" stroke="#5a1d0c" stroke-width="3"/>
    <rect x="14" y="14" width="172" height="242" rx="10" fill="none" stroke="#fde68a" stroke-width="2"/>
    <circle cx="100" cy="100" r="38" fill="none" stroke="#fde68a" stroke-width="3"/>
    <text x="100" y="200" text-anchor="middle" font-family="Geist Sans, serif" font-size="20" font-weight="700" fill="#fde68a" letter-spacing="2">PASSPORT</text>
    <text x="100" y="225" text-anchor="middle" font-family="Geist Sans, serif" font-size="12" fill="#fde68a" opacity="0.8">CHN · 漂哥</text>
  </g>
  <!-- coffee mug -->
  <g transform="translate(490 240) rotate(8)">
    <path d="M0 50 L0 130 Q0 160 30 160 L100 160 Q130 160 130 130 L130 50 Z" fill="#fef3c7" stroke="#b45309" stroke-width="3"/>
    <path d="M130 70 Q170 70 170 100 Q170 130 130 130" fill="none" stroke="#b45309" stroke-width="3"/>
    <ellipse cx="65" cy="50" rx="65" ry="14" fill="#92400e"/>
    <ellipse cx="65" cy="48" rx="58" ry="10" fill="#78350f"/>
    <!-- steam -->
    <path d="M40 30 Q35 10 45 0 Q50 -15 40 -25" fill="none" stroke="#b45309" stroke-width="2.5" opacity="0.5" stroke-linecap="round"/>
    <path d="M70 30 Q80 10 70 0 Q65 -15 75 -25" fill="none" stroke="#b45309" stroke-width="2.5" opacity="0.5" stroke-linecap="round"/>
    <path d="M95 30 Q90 15 100 5" fill="none" stroke="#b45309" stroke-width="2.5" opacity="0.4" stroke-linecap="round"/>
  </g>
  <!-- cards stack -->
  <g transform="translate(110 270) rotate(-12)">
    <rect x="0" y="0" width="200" height="120" rx="14" fill="#0f766e" stroke="#0a4f4a" stroke-width="3"/>
    <rect x="20" y="20" width="50" height="35" rx="4" fill="#fbbf24"/>
    <text x="20" y="100" font-family="Geist Sans, sans-serif" font-size="14" font-weight="600" fill="#ccfbf1">**** 8888</text>
  </g>
  <g transform="translate(150 250) rotate(4)">
    <rect x="0" y="0" width="200" height="120" rx="14" fill="#dc2626" stroke="#7f1d1d" stroke-width="3"/>
    <rect x="20" y="20" width="50" height="35" rx="4" fill="#fde68a"/>
    <text x="20" y="100" font-family="Geist Sans, sans-serif" font-size="14" font-weight="600" fill="#fee2e2">ZA · HK</text>
  </g>
  <!-- handwritten note -->
  <g transform="translate(560 90) rotate(5)">
    <path d="M0 0 L130 0 L130 90 L0 90 Z" fill="#fef9c3" stroke="#a16207" stroke-width="2"/>
    <line x1="12" y1="22" x2="118" y2="22" stroke="#a16207" stroke-width="1.2" opacity="0.4"/>
    <line x1="12" y1="40" x2="105" y2="40" stroke="#a16207" stroke-width="1.2" opacity="0.4"/>
    <line x1="12" y1="58" x2="118" y2="58" stroke="#a16207" stroke-width="1.2" opacity="0.4"/>
    <line x1="12" y1="76" x2="80" y2="76" stroke="#a16207" stroke-width="1.2" opacity="0.4"/>
  </g>
  <text x="40" y="460" font-family="Geist Sans, sans-serif" font-size="14" font-weight="500" fill="#7c2d12" opacity="0.55">— 我开过的那些海外账户 —</text>
</svg>
