<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" role="img" aria-label="跨境出海 · 我的数字游民笔记">
  <defs>
    <radialGradient id="paper4" cx="40%" cy="40%" r="85%">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="50%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#paper4)"/>
  <!-- soft sun -->
  <circle cx="640" cy="120" r="80" fill="#fde68a" opacity="0.6"/>
  <circle cx="640" cy="120" r="55" fill="#fbbf24" opacity="0.7"/>
  <!-- distant island -->
  <path d="M380 280 Q480 220 580 280 L580 360 L380 360 Z" fill="#84cc16" opacity="0.5"/>
  <path d="M420 285 L440 250 L460 285 M480 285 L505 240 L530 285" fill="none" stroke="#365314" stroke-width="2" opacity="0.6"/>
  <!-- ocean wave -->
  <path d="M0 360 Q100 340 200 360 T400 360 T600 360 T800 360 L800 500 L0 500 Z" fill="#60a5fa" opacity="0.55"/>
  <path d="M0 380 Q100 360 200 380 T400 380 T600 380 T800 380 L800 500 L0 500 Z" fill="#3b82f6" opacity="0.45"/>
  <path d="M0 400 Q100 385 200 400 T400 400 T600 400 T800 400 L800 500 L0 500 Z" fill="#1d4ed8" opacity="0.4"/>
  <!-- paper plane -->
  <g transform="translate(140 130) rotate(-12)">
    <path d="M0 30 L120 0 L100 70 L60 50 L20 80 L60 50 Z" fill="#ffffff" stroke="#0f172a" stroke-width="2.5"/>
    <line x1="0" y1="30" x2="60" y2="50" stroke="#0f172a" stroke-width="2"/>
    <!-- dashed trail -->
    <path d="M-30 60 Q-80 90 -130 80" fill="none" stroke="#0f172a" stroke-width="2" stroke-dasharray="6 5" opacity="0.4"/>
  </g>
  <!-- backpack -->
  <g transform="translate(220 280) rotate(-6)">
    <rect x="0" y="20" width="120" height="140" rx="20" fill="#7c2d12" stroke="#451a03" stroke-width="3"/>
    <rect x="20" y="0" width="80" height="40" rx="8" fill="#7c2d12" stroke="#451a03" stroke-width="3"/>
    <rect x="20" y="50" width="80" height="50" rx="6" fill="#fbbf24" stroke="#451a03" stroke-width="2.5"/>
    <line x1="0" y1="40" x2="-10" y2="100" stroke="#451a03" stroke-width="3"/>
    <line x1="120" y1="40" x2="130" y2="100" stroke="#451a03" stroke-width="3"/>
    <circle cx="60" cy="115" r="4" fill="#451a03"/>
  </g>
  <!-- handwritten note pin -->
  <g transform="translate(490 100) rotate(8)">
    <path d="M0 0 L160 0 L160 100 L0 100 Z" fill="#fef9c3" stroke="#a16207" stroke-width="2"/>
    <line x1="14" y1="24" x2="140" y2="24" stroke="#a16207" stroke-width="1.5" opacity="0.5"/>
    <line x1="14" y1="46" x2="120" y2="46" stroke="#a16207" stroke-width="1.5" opacity="0.5"/>
    <line x1="14" y1="68" x2="135" y2="68" stroke="#a16207" stroke-width="1.5" opacity="0.5"/>
    <line x1="14" y1="86" x2="90" y2="86" stroke="#a16207" stroke-width="1.5" opacity="0.5"/>
    <text x="14" y="20" font-family="Geist Sans, sans-serif" font-size="12" font-weight="700" fill="#a16207">to-do · 出海清单</text>
    <circle cx="80" cy="-2" r="6" fill="#dc2626" stroke="#7f1d1d" stroke-width="1.5"/>
  </g>
  <text x="40" y="465" font-family="Geist Sans, sans-serif" font-size="14" font-weight="500" fill="#1e3a8a" opacity="0.6">— 我的数字游民漂流笔记 —</text>
</svg>
