<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" role="img" aria-label="AI 美女相册 · 提示词与画框">
  <defs>
    <radialGradient id="paper6" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#fdf4ff"/>
      <stop offset="55%" stop-color="#f5d0fe"/>
      <stop offset="100%" stop-color="#e9b3f7"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#paper6)"/>
  <!-- soft blobs -->
  <circle cx="120" cy="120" r="80" fill="#fbcfe8" opacity="0.7"/>
  <circle cx="680" cy="380" r="100" fill="#fde68a" opacity="0.5"/>
  <!-- big polaroid frame -->
  <g transform="translate(180 110) rotate(-6)">
    <rect x="0" y="0" width="240" height="280" rx="6" fill="#ffffff" stroke="#9d174d" stroke-width="3"/>
    <rect x="14" y="14" width="212" height="212" fill="#fce7f3"/>
    <!-- silhouette -->
    <circle cx="120" cy="100" r="40" fill="#f9a8d4"/>
    <path d="M50 230 Q70 160 120 160 Q170 160 190 230 Z" fill="#f9a8d4"/>
    <!-- stars (sparkle) -->
    <g fill="#fde68a">
      <circle cx="60" cy="60" r="4"/>
      <circle cx="200" cy="50" r="5"/>
      <circle cx="180" cy="200" r="3"/>
      <circle cx="40" cy="180" r="3"/>
    </g>
    <text x="120" y="260" text-anchor="middle" font-family="Geist Sans, serif" font-size="13" font-weight="600" fill="#9d174d" letter-spacing="2">portrait · 023</text>
  </g>
  <!-- second polaroid -->
  <g transform="translate(440 200) rotate(8)">
    <rect x="0" y="0" width="180" height="220" rx="6" fill="#ffffff" stroke="#9d174d" stroke-width="3"/>
    <rect x="12" y="12" width="156" height="156" fill="#fdf2f8"/>
    <circle cx="90" cy="80" r="32" fill="#f0abfc"/>
    <path d="M40 170 Q55 120 90 120 Q125 120 140 170 Z" fill="#f0abfc"/>
    <text x="90" y="200" text-anchor="middle" font-family="Geist Sans, serif" font-size="11" font-weight="600" fill="#9d174d" letter-spacing="2">portrait · 045</text>
  </g>
  <!-- prompt note -->
  <g transform="translate(80 340) rotate(-2)">
    <path d="M0 0 L200 0 L200 100 L0 100 Z" fill="#fef9c3" stroke="#a16207" stroke-width="2"/>
    <text x="14" y="22" font-family="Geist Sans, sans-serif" font-size="13" font-weight="700" fill="#a16207">prompt:</text>
    <text x="14" y="42" font-family="Geist Sans, sans-serif" font-size="11" fill="#a16207" opacity="0.85">soft light, cinematic,</text>
    <text x="14" y="60" font-family="Geist Sans, sans-serif" font-size="11" fill="#a16207" opacity="0.85">portrait, warm tone,</text>
    <text x="14" y="78" font-family="Geist Sans, sans-serif" font-size="11" fill="#a16207" opacity="0.85">analog film grain</text>
  </g>
  <!-- camera icon -->
  <g transform="translate(640 100)">
    <rect x="0" y="20" width="100" height="70" rx="10" fill="#0f172a" stroke="#000" stroke-width="2"/>
    <rect x="20" y="10" width="40" height="20" rx="4" fill="#0f172a"/>
    <circle cx="50" cy="55" r="22" fill="#374151" stroke="#9ca3af" stroke-width="2"/>
    <circle cx="50" cy="55" r="14" fill="#1f2937"/>
    <circle cx="50" cy="55" r="6" fill="#fbbf24"/>
    <rect x="78" y="30" width="14" height="6" rx="2" fill="#fbbf24"/>
  </g>
  <text x="40" y="465" font-family="Geist Sans, sans-serif" font-size="14" font-weight="500" fill="#9d174d" opacity="0.6">— 写给镜头那一面的 prompt —</text>
</svg>
