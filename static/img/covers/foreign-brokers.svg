<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" role="img" aria-label="国外券商 · 港美股开户日记">
  <defs>
    <radialGradient id="paper2" cx="40%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#ecfdf5"/>
      <stop offset="55%" stop-color="#d6f1e1"/>
      <stop offset="100%" stop-color="#bce3cc"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#paper2)"/>
  <!-- soft blobs -->
  <circle cx="660" cy="380" r="130" fill="#a7e8c9" opacity="0.55"/>
  <circle cx="100" cy="100" r="70" fill="#fde68a" opacity="0.4"/>
  <!-- desk window with city -->
  <g transform="translate(60 80)">
    <rect x="0" y="0" width="320" height="200" rx="10" fill="#fdf3e3" stroke="#365314" stroke-width="3"/>
    <line x1="160" y1="0" x2="160" y2="200" stroke="#365314" stroke-width="2"/>
    <line x1="0" y1="100" x2="320" y2="100" stroke="#365314" stroke-width="2"/>
    <!-- skyline -->
    <rect x="20" y="120" width="32" height="60" fill="#365314" opacity="0.7"/>
    <rect x="60" y="100" width="38" height="80" fill="#365314" opacity="0.6"/>
    <rect x="105" y="130" width="40" height="50" fill="#365314" opacity="0.7"/>
    <rect x="180" y="115" width="35" height="65" fill="#365314" opacity="0.65"/>
    <rect x="222" y="135" width="32" height="45" fill="#365314" opacity="0.75"/>
    <rect x="262" y="105" width="40" height="75" fill="#365314" opacity="0.6"/>
    <!-- sun -->
    <circle cx="240" cy="50" r="20" fill="#fbbf24" opacity="0.85"/>
  </g>
  <!-- chart paper -->
  <g transform="translate(420 250) rotate(-4)">
    <rect x="0" y="0" width="280" height="180" rx="10" fill="#ffffff" stroke="#0f766e" stroke-width="3"/>
    <!-- chart axes -->
    <line x1="20" y1="160" x2="260" y2="160" stroke="#0f766e" stroke-width="2"/>
    <line x1="20" y1="20" x2="20" y2="160" stroke="#0f766e" stroke-width="2"/>
    <!-- candle chart -->
    <line x1="50" y1="80" x2="50" y2="135" stroke="#dc2626" stroke-width="2"/>
    <rect x="44" y="90" width="12" height="25" fill="#dc2626"/>
    <line x1="80" y1="60" x2="80" y2="120" stroke="#16a34a" stroke-width="2"/>
    <rect x="74" y="68" width="12" height="35" fill="#16a34a"/>
    <line x1="110" y1="50" x2="110" y2="100" stroke="#16a34a" stroke-width="2"/>
    <rect x="104" y="55" width="12" height="30" fill="#16a34a"/>
    <line x1="140" y1="45" x2="140" y2="90" stroke="#dc2626" stroke-width="2"/>
    <rect x="134" y="55" width="12" height="25" fill="#dc2626"/>
    <line x1="170" y1="35" x2="170" y2="85" stroke="#16a34a" stroke-width="2"/>
    <rect x="164" y="42" width="12" height="30" fill="#16a34a"/>
    <line x1="200" y1="25" x2="200" y2="70" stroke="#16a34a" stroke-width="2"/>
    <rect x="194" y="32" width="12" height="28" fill="#16a34a"/>
    <line x1="230" y1="40" x2="230" y2="80" stroke="#dc2626" stroke-width="2"/>
    <rect x="224" y="48" width="12" height="22" fill="#dc2626"/>
  </g>
  <!-- coffee + croissant -->
  <g transform="translate(150 320)">
    <ellipse cx="50" cy="70" rx="50" ry="14" fill="#92400e"/>
    <ellipse cx="50" cy="68" rx="44" ry="10" fill="#78350f"/>
    <path d="M0 70 L0 130 Q0 155 30 155 L70 155 Q100 155 100 130 L100 70 Z" fill="#fef3c7" stroke="#b45309" stroke-width="3"/>
    <path d="M100 90 Q130 90 130 115 Q130 140 100 140" fill="none" stroke="#b45309" stroke-width="3"/>
    <!-- croissant -->
    <g transform="translate(140 80) rotate(20)">
      <path d="M0 30 Q15 0 50 0 Q85 0 100 30 Q100 60 60 70 Q20 70 0 30 Z" fill="#fbbf24" stroke="#b45309" stroke-width="2.5"/>
      <path d="M20 25 L30 45 M40 20 L50 50 M60 20 L70 50 M80 25 L88 45" stroke="#b45309" stroke-width="1.8" fill="none"/>
    </g>
  </g>
  <text x="40" y="465" font-family="Geist Sans, sans-serif" font-size="14" font-weight="500" fill="#365314" opacity="0.55">— 在咖啡馆敲完的港美股开户日记 —</text>
</svg>
