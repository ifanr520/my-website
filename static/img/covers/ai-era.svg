<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" role="img" aria-label="AI 时代 · 我和 AI 的双人办公桌">
  <defs>
    <radialGradient id="paper5" cx="40%" cy="35%" r="85%">
      <stop offset="0%" stop-color="#fdf2f8"/>
      <stop offset="55%" stop-color="#fce7f3"/>
      <stop offset="100%" stop-color="#fbcfe8"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#paper5)"/>
  <!-- soft blob -->
  <circle cx="660" cy="120" r="100" fill="#a5b4fc" opacity="0.45"/>
  <circle cx="120" cy="380" r="80" fill="#fde68a" opacity="0.5"/>
  <!-- desk -->
  <rect x="40" y="380" width="720" height="20" fill="#7c2d12" opacity="0.85"/>
  <!-- laptop -->
  <g transform="translate(160 200)">
    <path d="M0 160 L40 70 L260 70 L300 160 Z" fill="#1f2937" stroke="#111827" stroke-width="3"/>
    <rect x="50" y="80" width="200" height="80" rx="4" fill="#fdf2f8"/>
    <!-- chat bubble on screen -->
    <rect x="65" y="90" width="120" height="20" rx="10" fill="#a5b4fc"/>
    <rect x="65" y="120" width="160" height="20" rx="10" fill="#fbbf24"/>
    <rect x="65" y="148" width="80" height="8" rx="4" fill="#a5b4fc" opacity="0.6"/>
    <rect x="-10" y="158" width="320" height="10" rx="3" fill="#374151"/>
  </g>
  <!-- robot character (rounded, friendly) -->
  <g transform="translate(490 230)">
    <ellipse cx="80" cy="170" rx="80" ry="10" fill="#9ca3af" opacity="0.4"/>
    <!-- body -->
    <rect x="20" y="80" width="120" height="80" rx="20" fill="#f3f4f6" stroke="#374151" stroke-width="3"/>
    <!-- head -->
    <rect x="35" y="20" width="90" height="70" rx="18" fill="#ffffff" stroke="#374151" stroke-width="3"/>
    <!-- antenna -->
    <line x1="80" y1="20" x2="80" y2="0" stroke="#374151" stroke-width="3"/>
    <circle cx="80" cy="-4" r="6" fill="#fbbf24" stroke="#374151" stroke-width="2"/>
    <!-- eyes -->
    <circle cx="62" cy="50" r="6" fill="#0f172a"/>
    <circle cx="98" cy="50" r="6" fill="#0f172a"/>
    <circle cx="64" cy="48" r="2" fill="#ffffff"/>
    <circle cx="100" cy="48" r="2" fill="#ffffff"/>
    <!-- mouth -->
    <path d="M65 70 Q80 78 95 70" stroke="#374151" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- arm holding cup -->
    <path d="M140 110 Q170 110 175 130 Q175 145 160 145" fill="none" stroke="#374151" stroke-width="3"/>
    <!-- coffee cup -->
    <g transform="translate(155 140)">
      <rect x="-5" y="0" width="22" height="28" rx="3" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
      <rect x="-5" y="-2" width="22" height="6" fill="#78350f"/>
    </g>
    <!-- chest screen -->
    <rect x="50" y="100" width="60" height="40" rx="4" fill="#1f2937"/>
    <text x="80" y="125" text-anchor="middle" font-family="Geist Sans, sans-serif" font-size="13" font-weight="700" fill="#5eead4">AI</text>
  </g>
  <!-- speech bubble -->
  <g transform="translate(80 130)">
    <path d="M0 30 Q0 0 30 0 L130 0 Q160 0 160 30 L160 70 Q160 100 130 100 L40 100 L20 120 L25 95 Q0 90 0 70 Z" fill="#ffffff" stroke="#374151" stroke-width="2.5"/>
    <text x="20" y="40" font-family="Geist Sans, sans-serif" font-size="14" font-weight="600" fill="#0f172a">早安 ☕</text>
    <text x="20" y="62" font-family="Geist Sans, sans-serif" font-size="12" fill="#374151">今天调研什么？</text>
    <text x="20" y="82" font-family="Geist Sans, sans-serif" font-size="11" fill="#6b7280" opacity="0.7">— 我的双人办公桌</text>
  </g>
  <text x="40" y="465" font-family="Geist Sans, sans-serif" font-size="14" font-weight="500" fill="#831843" opacity="0.6">— 我和 AI 一起搬砖的日常 —</text>
</svg>
