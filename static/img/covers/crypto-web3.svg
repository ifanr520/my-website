<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" role="img" aria-label="加密 Web3 · 链上的另一个世界">
  <defs>
    <radialGradient id="paper3" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#fef2f2"/>
      <stop offset="55%" stop-color="#fde8e8"/>
      <stop offset="100%" stop-color="#f8d4d4"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#paper3)"/>
  <!-- soft blobs -->
  <circle cx="100" cy="120" r="85" fill="#fbbf24" opacity="0.45"/>
  <circle cx="700" cy="380" r="100" fill="#fda4af" opacity="0.55"/>
  <!-- big coin -->
  <g transform="translate(280 120)">
    <circle cx="120" cy="120" r="115" fill="#fde68a" stroke="#92400e" stroke-width="4"/>
    <circle cx="120" cy="120" r="100" fill="none" stroke="#92400e" stroke-width="2.5" stroke-dasharray="6 4"/>
    <text x="120" y="138" text-anchor="middle" font-family="Geist Sans, sans-serif" font-size="76" font-weight="700" fill="#92400e">₿</text>
    <text x="120" y="200" text-anchor="middle" font-family="Geist Sans, sans-serif" font-size="14" font-weight="600" fill="#92400e" letter-spacing="2">SATOSHI · 2009</text>
  </g>
  <!-- small coin USDT -->
  <g transform="translate(120 270) rotate(-15)">
    <circle cx="40" cy="40" r="38" fill="#5eead4" stroke="#0f766e" stroke-width="3"/>
    <text x="40" y="50" text-anchor="middle" font-family="Geist Sans, sans-serif" font-size="22" font-weight="800" fill="#0f766e">₮</text>
  </g>
  <!-- small coin ETH -->
  <g transform="translate(630 280) rotate(12)">
    <circle cx="40" cy="40" r="38" fill="#a5b4fc" stroke="#3730a3" stroke-width="3"/>
    <path d="M40 16 L25 42 L40 50 L55 42 Z M40 56 L25 46 L40 64 L55 46 Z" fill="#3730a3"/>
  </g>
  <!-- handwritten note -->
  <g transform="translate(80 380) rotate(-3)">
    <path d="M0 0 L180 0 L180 90 L0 90 Z" fill="#fef9c3" stroke="#a16207" stroke-width="2"/>
    <line x1="14" y1="22" x2="160" y2="22" stroke="#a16207" stroke-width="1.5" opacity="0.5"/>
    <line x1="14" y1="42" x2="140" y2="42" stroke="#a16207" stroke-width="1.5" opacity="0.5"/>
    <line x1="14" y1="62" x2="155" y2="62" stroke="#a16207" stroke-width="1.5" opacity="0.5"/>
    <text x="14" y="20" font-family="Geist Sans, sans-serif" font-size="13" font-weight="700" fill="#a16207">助记词 · 12 词</text>
    <text x="14" y="80" font-family="Geist Sans, sans-serif" font-size="10" fill="#a16207" opacity="0.7">— 离线手写 —</text>
  </g>
  <!-- chain link -->
  <g transform="translate(540 100) rotate(20)" stroke="#7c2d12" stroke-width="3" fill="none">
    <ellipse cx="20" cy="20" rx="20" ry="13"/>
    <ellipse cx="50" cy="38" rx="20" ry="13"/>
    <ellipse cx="80" cy="56" rx="20" ry="13"/>
  </g>
  <text x="40" y="465" font-family="Geist Sans, sans-serif" font-size="14" font-weight="500" fill="#7c2d12" opacity="0.55">— 还在小心翼翼摸索的链上世界 —</text>
</svg>
